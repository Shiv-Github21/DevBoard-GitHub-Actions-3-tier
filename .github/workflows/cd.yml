name: CD

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy example env file to .env
        run: cp .env.example .env

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy Frontend
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/frontend:latest

          docker stop frontend || true
          docker rm frontend || true

          docker run -d \
            --name frontend \
            --restart unless-stopped \
            -p 80:80 \
            ${{ vars.DOCKER_USERNAME }}/frontend:latest

      - name: Deploy Backend
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/backend:latest

          docker stop backend || true
          docker rm backend || true

          docker run -d \
            --name backend \
            --restart unless-stopped \
            -p 8080:8080 \
            ${{ vars.DOCKER_USERNAME }}/backend:latest

      - name: Cleanup unused Docker resources
        run: |
          docker image prune -af
          docker container prune -f