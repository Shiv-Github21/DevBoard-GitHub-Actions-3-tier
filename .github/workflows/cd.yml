name: CD

on:
    workflow_call:

jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: copy example env file to .env
              run: cp .env.example .env

            # - name: setup docker
            #   uses: docker/setup-buildx-action@v2

            - name: Login to dockerhub
              uses: docker/Login-action@v2
              with:
                username: ${{ vars.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            # - name: pull and run docker image for fe
            #   run: |
            #       docker pull ${{ vars.DOCKER_USERNAME }}/frontend:latest
            #       docker run -d -p 80:80 ${{ vars.DOCKER_USERNAME }}/frontend:latest
                  
            # - name: pull and run docker image for be
            #   run: |
            #       docker pull ${{ vars.DOCKER_USERNAME }}/backend:latest
            #       docker run -d -p 8080:8080 ${{ vars.DOCKER_USERNAME }}/backend:latest    
            - name: Deploy with Docker Compose
              run: |
                 docker compose pull
                 docker compose up -d --remove-orphans     